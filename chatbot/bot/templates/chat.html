<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot</title>
</head>
<body>
    <h1>ChatBot</h1>

    <div id="chat-container">
        {% for message in messages %}
            <div class="message {% if message.is_user %}user{% else %}bot{% endif %}">
                <strong>{% if message.is_user %}User{% else %}Bot{% endif %}:</strong> {{ message.text }}
            </div>
        {% endfor %}
    </div>
    <form id="chat-form" method="post" action="{% url 'chat' %}">
        {% csrf_token %}
        <input type="text" id="user-input" placeholder="Type your message..." name="message" required>
        <button type="submit">Send</button>
    </form>
</body>
</html>
